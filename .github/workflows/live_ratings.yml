name: Live Racing Ratings

on:
  schedule:
    # 6pm GMT daily
    - cron: '0 18 * * *'
    # 10pm GMT daily
    - cron: '0 22 * * *'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD), leave empty for today'
        required: false
        default: ''

jobs:
  live-ratings:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas numpy scikit-learn requests beautifulsoup4

      - name: Extract data archives
        run: |
          # Extract the .7z archives needed for standard times / calibration
          sudo apt-get update && sudo apt-get install -y p7zip-full
          cd data/raw
          for f in *.7z; do
            [ -f "$f" ] && 7z x -y "$f"
          done

      - name: Run full pipeline (generate standard times)
        run: python src/speed_figures.py

      - name: Run live ratings
        env:
          HRB_USER: ${{ secrets.HRB_USER }}
          HRB_PASS: ${{ secrets.HRB_PASS }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: |
          DATE_ARG="${{ github.event.inputs.date }}"
          if [ -n "$DATE_ARG" ]; then
            python src/live_ratings.py --date "$DATE_ARG"
          else
            python src/live_ratings.py
          fi

      - name: Upload ratings artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ratings-${{ github.run_id }}
          path: data/live/
          retention-days: 30
