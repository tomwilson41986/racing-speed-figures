name: Live Racing Ratings

on:
  schedule:
    # 6pm GMT daily
    - cron: '0 18 * * *'
    # 10pm GMT daily
    - cron: '0 22 * * *'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD), leave empty for today'
        required: false
        default: ''
      send_email:
        description: 'Send email with results?'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  live-ratings:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy scikit-learn requests beautifulsoup4 openpyxl

      - name: Extract data archives
        run: |
          sudo apt-get update && sudo apt-get install -y p7zip-full
          cd data/raw
          for f in *.7z; do
            [ -f "$f" ] && 7z x -y "$f"
          done

      - name: Verify secrets are configured
        env:
          HRB_USER: ${{ secrets.HRB_USER }}
          HRB_PASS: ${{ secrets.HRB_PASS }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: |
          echo "=== Secret Configuration Check ==="
          if [ -z "$HRB_USER" ]; then echo "WARNING: HRB_USER secret is NOT set"; else echo "OK: HRB_USER is set"; fi
          if [ -z "$HRB_PASS" ]; then echo "WARNING: HRB_PASS secret is NOT set"; else echo "OK: HRB_PASS is set"; fi
          if [ -z "$SMTP_USER" ]; then echo "WARNING: SMTP_USER secret is NOT set"; else echo "OK: SMTP_USER is set"; fi
          if [ -z "$SMTP_PASS" ]; then echo "WARNING: SMTP_PASS secret is NOT set"; else echo "OK: SMTP_PASS is set"; fi

      - name: Run full pipeline (generate standard times)
        run: python src/speed_figures.py

      - name: Run live ratings
        env:
          HRB_USER: ${{ secrets.HRB_USER }}
          HRB_PASS: ${{ secrets.HRB_PASS }}
          HRB_USER_ID: ${{ secrets.HRB_USER_ID }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: |
          DATE_ARG="${{ github.event.inputs.date }}"
          SEND_EMAIL="${{ github.event.inputs.send_email }}"
          # Default to sending email for scheduled runs
          if [ -z "$SEND_EMAIL" ]; then
            SEND_EMAIL="true"
          fi
          if [ "$SEND_EMAIL" = "true" ]; then
            if [ -n "$DATE_ARG" ]; then
              python src/live_ratings.py --date "$DATE_ARG"
            else
              python src/live_ratings.py
            fi
          else
            if [ -n "$DATE_ARG" ]; then
              python src/live_ratings.py --date "$DATE_ARG" --no-email
            else
              python src/live_ratings.py --no-email
            fi
          fi

      - name: Show results summary
        run: |
          DATE_ARG="${{ github.event.inputs.date }}"
          if [ -z "$DATE_ARG" ]; then
            DATE_ARG=$(date -u +%Y-%m-%d)
          fi
          CSV="data/live/ratings_${DATE_ARG}.csv"
          if [ -f "$CSV" ]; then
            echo "=== Ratings Summary ==="
            python3 -c "
          import pandas as pd
          df = pd.read_csv('${CSV}')
          rated = df[df['figure_calibrated'].notna()]
          print(f'Runners rated: {len(rated)}/{len(df)}')
          print(f'Races: {df[\"raceNumber\"].nunique()}')
          print(f'Courses: {\", \".join(df[\"courseName\"].unique())}')
          print()
          print('Top 10:')
          top = rated.nlargest(10, 'figure_calibrated')
          for _, r in top.iterrows():
              print(f'  {r[\"horseName\"]:25s}  {r[\"courseName\"]:15s}  R{int(r[\"raceNumber\"])}  '
                    f'Pos {int(r[\"positionOfficial\"])}  OR {int(r[\"officialRating\"]) if r[\"officialRating\"] > 0 else \"-\":>3}  '
                    f'Wgt {int(r[\"weightCarried\"])}  Fig {r[\"figure_calibrated\"]:.0f}')
          "
          else
            echo "No ratings CSV generated"
          fi

      - name: Upload ratings artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ratings-${{ github.run_id }}
          path: data/live/
          retention-days: 90

      - name: Commit daily ratings xlsx
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/daily_ratings/*.xlsx
          if git diff --cached --quiet; then
            echo "No new xlsx files to commit"
          else
            DATE_ARG="${{ github.event.inputs.date }}"
            if [ -z "$DATE_ARG" ]; then
              DATE_ARG=$(date -u +%Y-%m-%d)
            fi
            git commit -m "Add daily ratings for ${DATE_ARG}"
            git push
          fi
